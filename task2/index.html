<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <header class="calc-header">
            <h1>JS Calculator</h1>
            <p>Perform basic arithmetic operations dynamically.</p>
        </header>

        <main class="calc-content">
            <div class="input-group">
                <input type="number" id="num1" placeholder="Enter first number">
            </div>

            <div class="input-group">
                <select id="operation">
                    <option value="add">+</option>
                    <option value="subtract">-</option>
                    <option value="multiply">×</option>
                    <option value="divide">÷</option>
                </select>
            </div>

            <div class="input-group">
                <input type="number" id="num2" placeholder="Enter second number">
            </div>

            <div class="controls">
                <button id="calc-btn" class="btn primary-btn">Calculate</button>
                <button id="clear-btn" class="btn secondary-btn">Clear</button>
            </div>

            <div id="result-box" class="result-box hidden">
                <h2>Result</h2>
                <div id="result-value" class="result-value">0</div>
                <p id="error-msg" class="error-msg"></p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
